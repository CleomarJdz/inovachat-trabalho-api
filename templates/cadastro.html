{% extends 'base.html' %}{% block content %}
<div class='box' style='max-width: 400px; margin: 80px auto;'>
    <h1 style='text-align: center; margin-bottom: 30px; font-size: 28px;'>Criar Conta</h1>
    <form method='post'>
        <div class='form-group'>
            <label>Nome</label>
            <input type='text' name='nome' placeholder='Seu nome completo' required>
        </div>
        <div class='form-group'>
            <label>Email</label>
            <input type='email' name='email' placeholder='seu@email.com' required>
        </div>
        <div class='form-group'>
            <label>Senha</label>
            <input type='password' name='senha' placeholder='Crie uma senha segura' required>
        </div>
        <button style='width: 100%; margin-top: 20px;'>Cadastrar</button>
    </form>
    <p style='text-align: center; margin-top: 20px; color: #999;'>
        Já tem conta? <a href='/login' style='color: #10a37f;'>Faça login</a>
    </p>
</div>
{% endblock %}
