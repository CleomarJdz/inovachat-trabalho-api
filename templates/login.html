{% extends 'base.html' %}{% block content %}
<div class='box' style='max-width: 400px; margin: 100px auto;'>
    <h1 style='text-align: center; margin-bottom: 30px; font-size: 28px;'>INOVACHAT BETA</h1>
    <form method='post'>
        <div class='form-group'>
            <label>Email</label>
            <input type='email' name='email' placeholder='seu@email.com' required>
        </div>
        <div class='form-group'>
            <label>Senha</label>
            <input type='password' name='senha' placeholder='Sua senha' required>
        </div>
        <button style='width: 100%; margin-top: 20px;'>Entrar</button>
    </form>
    <p style='text-align: center; margin-top: 20px; color: #999;'>
        Não tem conta? <a href='/cadastro' style='color: #10a37f;'>Criar uma agora</a>
    </p>
</div>
{% endblock %}
